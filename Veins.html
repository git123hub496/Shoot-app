<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veins: A Relaxing Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    user-select: none;
  }

  #canvas {
    display: block;
    background: #111;
  }

  #title {
    position: absolute;
    top: 20px;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    text-align: center;
    width: 100%;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 0 10px #00ffcc;
  }

  #holdButton {
    position: absolute;
    bottom: 50px;
    padding: 20px 40px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: #444;
    color: white;
    cursor: pointer;
    z-index: 10;
  }

  #holdButton:active {
    background: #666;
  }

  #colorPicker {
    position: absolute;
    bottom: 120px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="title">Veins: A Relaxing Game</div>
<canvas id="canvas"></canvas>
<button id="holdButton">Hold Me</button>
<input type="color" id="colorPicker" value="#00ffcc">

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const button = document.getElementById('holdButton');
const colorPicker = document.getElementById('colorPicker');

let holding = false;
let veins = [];
let targetColor = {r:0, g:255, b:204};
const MAX_VEINS = 400;
const CONNECT_DIST = 50;

// Button center
function getButtonCenter() {
  const rect = button.getBoundingClientRect();
  return {x: rect.left + rect.width/2, y: rect.top + rect.height/2};
}

// Color picker
colorPicker.addEventListener('input', ()=>{
  const hex = colorPicker.value;
  targetColor.r = parseInt(hex.slice(1,3),16);
  targetColor.g = parseInt(hex.slice(3,5),16);
  targetColor.b = parseInt(hex.slice(5,7),16);
});

// Vein class
class Vein {
  constructor(x, y, parent=null) {
    this.x = x;
    this.y = y;
    this.parent = parent;
    this.angle = Math.random()*Math.PI*2;
    this.length = Math.random()*3+2;
    this.color = {r:50, g:50, b:50};
    this.connected = parent ? [parent] : [];
  }

  update() {
    this.x += Math.cos(this.angle) * this.length;
    this.y += Math.sin(this.angle) * this.length;

    // color towards target
    this.color.r += (targetColor.r - this.color.r) * 0.03;
    this.color.g += (targetColor.g - this.color.g) * 0.03;
    this.color.b += (targetColor.b - this.color.b) * 0.03;

    // small chance to branch
    if(veins.length < MAX_VEINS && Math.random() < 0.01){
      const child = new Vein(this.x, this.y, this);
      veins.push(child);
    }

    // occasional connection to nearest vein
    if(Math.random() < 0.05){
      let nearest = null;
      let minDist = CONNECT_DIST;
      for(let v of veins){
        if(v === this || this.connected.includes(v)) continue;
        const dx = v.x - this.x;
        const dy = v.y - this.y;
        const dist = dx*dx + dy*dy;
        if(dist < minDist*minDist){
          minDist = Math.sqrt(dist);
          nearest = v;
        }
      }
      if(nearest) this.connected.push(nearest);
    }
  }

  draw() {
    ctx.strokeStyle = `rgb(${this.color.r},${this.color.g},${this.color.b})`;
    for(let c of this.connected){
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(c.x, c.y);
      ctx.stroke();
    }
  }
}

// Animate
function animate(){
  ctx.fillStyle = "rgba(17,17,17,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let v of veins){
    v.update();
    v.draw();
  }

  requestAnimationFrame(animate);
}
animate();

// Spawn veins from button
function spawnVein(){
  if(holding && veins.length < MAX_VEINS){
    const center = getButtonCenter();
    veins.push(new Vein(center.x, center.y));
  }
  requestAnimationFrame(spawnVein);
}
spawnVein();

// Button events
button.addEventListener('mousedown', ()=>holding=true);
button.addEventListener('mouseup', ()=>holding=false);
button.addEventListener('mouseleave', ()=>holding=false);
button.addEventListener('touchstart', (e)=>{e.preventDefault(); holding=true});
button.addEventListener('touchend', (e)=>{e.preventDefault(); holding=false});

// Resize
window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
