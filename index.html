<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHOOT</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Prevents scrolling on mobile */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui {
            position: absolute;
            top: 20px;
            pointer-events: none;
            text-align: center;
        }

        canvas {
            display: block;
            touch-action: none; /* Required for mobile interaction */
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>SHOOT</h1>
        <p>Tap for a pulse | Hold for a beam</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // State variables
        let width, height;
        let isPressing = false;
        let pressStartTime = 0;
        let projectiles = [];

        // Circle properties
        const circle = {
            x: 0,
            y: 0,
            radius: 40,
            color: '#555'
        };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            circle.x = width / 2;
            circle.y = height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        // Interaction Handlers
        function startPress(e) {
            isPressing = true;
            pressStartTime = Date.now();
            circle.color = '#ffffff'; // Turns white when pressed
        }

        function endPress(e) {
            if (!isPressing) return;
            
            const duration = Date.now() - pressStartTime;
            circle.color = '#555'; // Back to grey
            
            // Create the "line" (projectile)
            // If hold is very short, it's a small pulse. 
            // If hold is long, the line length reflects the duration.
            const lineLength = Math.min(duration / 2, 300); 
            
            projectiles.push({
                x: circle.x,
                y: circle.y,
                length: lineLength,
                speed: 12,
                opacity: 1
            });

            isPressing = false;
        }

        // Event Listeners for Mouse and Touch
        canvas.addEventListener('mousedown', startPress);
        window.addEventListener('mouseup', endPress);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPress(); });
        window.addEventListener('touchend', endPress);

        function update() {
            // Move projectiles upward
            projectiles.forEach((p, index) => {
                p.y -= p.speed;
                p.opacity -= 0.01; // Fade out effect
                
                if (p.y + p.length < 0 || p.opacity <= 0) {
                    projectiles.splice(index, 1);
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, width, height);

            // Draw Projectiles
            ctx.lineWidth = 4;
            projectiles.forEach(p => {
                ctx.strokeStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.length);
                ctx.stroke();
            });

            // Draw Circle
            ctx.beginPath();
            ctx.arc(circle.x, circle.y, circle.radius, 0, Math.PI * 2);
            ctx.fillStyle = circle.color;
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Visual feedback while holding
            if (isPressing) {
                const currentHold = (Date.now() - pressStartTime) / 2;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.moveTo(circle.x, circle.y - circle.radius);
                ctx.lineTo(circle.x, circle.y - circle.radius - Math.min(currentHold, 300));
                ctx.stroke();
            }

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
